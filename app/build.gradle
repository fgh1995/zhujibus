plugins {
    alias(libs.plugins.android.application)
}

android {
    namespace 'org.zjfgh.zhujibus'
    compileSdk 35

    defaultConfig {
        applicationId "org.zjfgh.zhujibus"
        minSdk 24
        targetSdk 35
        versionCode 102001
        versionName "1.2.0-beta"

        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_11
        targetCompatibility JavaVersion.VERSION_11
    }
    buildFeatures {
        viewBinding true
    }
}

dependencies {

    implementation libs.appcompat
    implementation libs.material
    implementation libs.activity
    implementation libs.constraintlayout
    implementation libs.navigation.fragment
    implementation libs.navigation.ui
    testImplementation libs.junit
    androidTestImplementation libs.ext.junit
    androidTestImplementation libs.espresso.core
    // 网络请求和 JSON 处理依赖
    implementation libs.okhttp       // OkHttp
    implementation libs.jackson.databind // Jackson
    implementation libs.kotlinx.coroutines.android
    // 腾讯地图 SDK
    implementation libs.tencent.map.sdk
    // 腾讯地图基础库
    implementation libs.tencent.map.foundation
    // 腾讯定位 SDK
    implementation 'com.tencent.map.geolocation:TencentLocationSdk-openplatform:7.5.4.3'
}