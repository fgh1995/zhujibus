<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>诸暨公交APP-在线用户统计</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0d1117;
            color: #c9d1d9;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 20px 16px;
        }
        .container { max-width: 1300px; width: 100%; }

        /* 标题区域 */
        h1 { font-size: 24px; font-weight: 600; margin-bottom: 6px; color: #f0f6fc; }
        .subtitle { color: #8b949e; margin-bottom: 16px; font-size: 13px; }
        .header-row { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; margin-bottom: 16px; }
        .refresh-btn {
            background: #21262d;
            border: 1px solid #30363d;
            color: #c9d1d9;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            transition: background 0.2s;
            white-space: nowrap;
        }
        .refresh-btn:hover { background: #30363d; }
        .refresh-btn:active { background: #161b22; }

        /* 登录框 */
        .login-box {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 12px;
            padding: 24px 20px;
            max-width: 400px;
            margin: 40px auto;
        }
        .login-box h2 { margin-bottom: 12px; font-size: 18px; color: #f0f6fc; }
        .login-box input {
            width: 100%;
            padding: 12px 14px;
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 8px;
            color: #c9d1d9;
            font-size: 16px;
            margin-bottom: 12px;
        }
        .login-box input:focus { outline: none; border-color: #58a6ff; }
        .login-box button {
            width: 100%;
            padding: 12px;
            background: #238636;
            border: none;
            border-radius: 8px;
            color: #fff;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        .login-box button:hover { background: #2ea043; }
        .login-box button:active { background: #238636; }
        .login-box .error { color: #f85149; font-size: 14px; margin-top: 8px; display: none; }

        /* 统计卡片 */
        .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 20px; }
        .stat-card {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 10px;
            padding: 16px 12px;
            text-align: center;
        }
        .stat-card .number { font-size: 28px; font-weight: 700; color: #f0f6fc; }
        .stat-card .label { color: #8b949e; font-size: 12px; margin-top: 4px; }
        .stat-card.online .number { color: #3fb950; }
        .stat-card.offline .number { color: #f85149; }
        .stat-card.total .number { color: #58a6ff; }

        /* 表格容器 - 桌面端 */
        .table-wrapper {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 12px;
            overflow-x: auto;
        }
        table { width: 100%; border-collapse: collapse; min-width: 800px; }
        thead { background: #0d1117; }
        th {
            text-align: left;
            padding: 12px 16px;
            font-size: 12px;
            font-weight: 600;
            color: #8b949e;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 1px solid #30363d;
            white-space: nowrap;
        }
        td {
            padding: 12px 16px;
            border-bottom: 1px solid #21262d;
            font-size: 14px;
            vertical-align: middle;
            white-space: nowrap;
        }
        tr:last-child td { border-bottom: none; }

        /* 用户卡片列表 - 移动端 */
        .user-cards { display: none; }
        .user-card {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 10px;
            padding: 14px 16px;
            margin-bottom: 12px;
        }
        .user-card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        .user-card-id { font-size: 13px; color: #8b949e; }
        .user-card-actions { display: flex; gap: 8px; align-items: center; }
        .user-card-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 0;
            border-bottom: 1px solid #21262d;
        }
        .user-card-row:last-child { border-bottom: none; }
        .user-card-label { font-size: 12px; color: #8b949e; }
        .user-card-value {
            font-size: 12px;
            color: #c9d1d9;
            text-align: right;
            max-width: 60%;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            font-family: monospace;
        }

        /* 状态徽章 */
        .status-badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }
        .status-online { background: #1a3a2a; color: #3fb950; }
        .status-offline { background: #3a1a1a; color: #f85149; }

        /* 版本号标签 */
        .version-tag {
            display: inline-block;
            padding: 2px 8px;
            background: #1f3a5f;
            color: #79c0ff;
            border-radius: 4px;
            font-size: 11px;
            font-family: 'Consolas', 'Monaco', monospace;
        }

        /* 备注输入 */
        .note-input {
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 6px;
            color: #c9d1d9;
            padding: 6px 10px;
            font-size: 13px;
            width: 140px;
        }
        .note-input:focus { outline: none; border-color: #58a6ff; }
        .note-saved {
            color: #3fb950;
            font-size: 11px;
            margin-left: 4px;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .note-saved.show { opacity: 1; }

        /* 移动端备注输入 */
        .note-input-mobile {
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 6px;
            color: #c9d1d9;
            padding: 8px 10px;
            font-size: 14px;
            width: 100%;
            margin-top: 4px;
        }
        .note-input-mobile:focus { outline: none; border-color: #58a6ff; }

        /* 删除按钮 */
        .btn-delete {
            background: #21262d;
            border: 1px solid #da3633;
            color: #f85149;
            padding: 5px 10px;
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-delete:hover { background: #da3633; color: #fff; }
        .btn-delete:active { background: #b62324; }
        .btn-delete-mobile {
            background: #21262d;
            border: 1px solid #da3633;
            color: #f85149;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 13px;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
        }

        .timestamp {
            color: #8b949e;
            font-size: 11px;
            margin-top: 10px;
            text-align: center;
        }
        .hidden { display: none !important; }

        /* ===== 移动端适配 ===== */
        @media (max-width: 768px) {
            body { padding: 16px 12px; }
            h1 { font-size: 18px; }
            .subtitle { font-size: 12px; margin-bottom: 12px; }
            .header-row { margin-bottom: 12px; }
            .refresh-btn { padding: 6px 12px; font-size: 13px; }

            .login-box { padding: 20px 16px; margin: 20px auto; }
            .login-box h2 { font-size: 16px; }

            .stats { grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 16px; }
            .stat-card { padding: 12px 8px; }
            .stat-card .number { font-size: 22px; }
            .stat-card .label { font-size: 11px; }

            /* 隐藏表格，显示卡片 */
            .table-wrapper { display: none; }
            .user-cards { display: block; }

            .timestamp { font-size: 10px; margin-top: 8px; }
        }

        /* 超小屏幕适配 */
        @media (max-width: 360px) {
            h1 { font-size: 16px; }
            .subtitle { font-size: 11px; }
            .stats { gap: 6px; }
            .stat-card { padding: 10px 6px; }
            .stat-card .number { font-size: 18px; }
            .stat-card .label { font-size: 10px; }
            .user-card { padding: 12px 14px; }
        }

        /* 桌面端隐藏卡片 */
        @media (min-width: 769px) {
            .user-cards { display: none; }
            .table-wrapper { display: block; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header-row">
        <div>
            <h1>📡 诸暨公交APP在线用户</h1>
            <div class="subtitle">实时查看所有连接设备 · 支持备注与删除</div>
        </div>
        <button class="refresh-btn" onclick="loadData()">⟳ 刷新</button>
    </div>

    <div id="loginBox" class="login-box">
        <h2>🔐 请输入管理密码</h2>
        <input type="password" id="passwordInput" placeholder="请输入密码" />
        <button onclick="login()">进入管理面板</button>
        <div class="error" id="loginError">密码错误，请重试</div>
    </div>

    <div id="content" class="hidden">
        <div class="stats" id="stats">
            <div class="stat-card total"><div class="number" id="totalCount">0</div><div class="label">总用户</div></div>
            <div class="stat-card online"><div class="number" id="onlineCount">0</div><div class="label">在线</div></div>
            <div class="stat-card offline"><div class="number" id="offlineCount">0</div><div class="label">离线</div></div>
        </div>

        <!-- 桌面端表格 -->
        <div class="table-wrapper">
            <table>
                <thead><tr>
                    <th>编号</th>
                    <th>安卓安装标识</th>
                    <th>状态</th>
                    <th>版本</th>
                    <th>首次连接</th>
                    <th>最后心跳</th>
                    <th>备注</th>
                    <th>操作</th>
                </tr></thead>
                <tbody id="userTableBody"><tr><td colspan="8" style="text-align:center;color:#8b949e;">加载中...</td></tr></tbody>
            </table>
        </div>

        <!-- 移动端卡片列表 -->
        <div class="user-cards" id="userCards"><div style="text-align:center;color:#8b949e;padding:20px;">加载中...</div></div>

        <div class="timestamp" id="updateTime">最后更新：--</div>
    </div>
</div>
<script>
    let isLoggedIn = false, refreshInterval = null;
    const TOKEN_KEY = 'ws_admin_token';

    function getToken() {
        let token = document.getElementById('passwordInput').value;
        if (!token) {
            token = sessionStorage.getItem(TOKEN_KEY) || '';
            if (token) document.getElementById('passwordInput').value = token;
        }
        return token;
    }

    function saveToken(token) {
        if (token) sessionStorage.setItem(TOKEN_KEY, token);
        else sessionStorage.removeItem(TOKEN_KEY);
    }

    function apiFetch(url, options = {}) {
        options.headers = Object.assign({ 'X-Token': getToken() }, options.headers || {});
        return fetch(url, options);
    }

    function login() {
        const token = getToken();
        const errorEl = document.getElementById('loginError');
        if (!token) { errorEl.style.display = 'block'; errorEl.textContent = '请输入密码'; return; }
        apiFetch('/api/users')
            .then(res => {
                if (res.status === 401) { errorEl.style.display = 'block'; errorEl.textContent = '密码错误，请重试'; return Promise.reject('unauthorized'); }
                return res.json();
            })
            .then(data => {
                isLoggedIn = true;
                saveToken(token);
                document.getElementById('loginBox').classList.add('hidden');
                document.getElementById('content').classList.remove('hidden');
                renderData(data);
                if (refreshInterval) clearInterval(refreshInterval);
                refreshInterval = setInterval(loadData, 5000);
            })
            .catch(err => { if (err !== 'unauthorized') console.error('登录失败:', err); });
    }

    function autoLogin() {
        const savedToken = sessionStorage.getItem(TOKEN_KEY);
        if (savedToken) {
            document.getElementById('passwordInput').value = savedToken;
            login();
        }
    }

    function loadData() {
        if (!isLoggedIn) return;
        apiFetch('/api/users')
            .then(res => {
                if (res.status === 401) {
                    isLoggedIn = false;
                    saveToken('');
                    if (refreshInterval) clearInterval(refreshInterval);
                    document.getElementById('loginBox').classList.remove('hidden');
                    document.getElementById('content').classList.add('hidden');
                    document.getElementById('loginError').style.display = 'block';
                    document.getElementById('loginError').textContent = '会话已过期，请重新登录';
                    return Promise.reject('unauthorized');
                }
                return res.json();
            })
            .then(data => { if (data) renderData(data); })
            .catch(err => { if (err !== 'unauthorized') console.error('加载数据失败:', err); });
    }

    function renderData(data) {
        document.getElementById('totalCount').textContent = data.total || 0;
        document.getElementById('onlineCount').textContent = data.online || 0;
        document.getElementById('offlineCount').textContent = data.offline || 0;
        document.getElementById('updateTime').textContent = '最后更新：' + formatTime(new Date());

        const activeEl = document.activeElement;
        if (activeEl && activeEl.classList && (activeEl.classList.contains('note-input') || activeEl.classList.contains('note-input-mobile'))) {
            console.log('检测到备注输入中，跳过表格刷新');
            return;
        }

        if (!data.users || data.users.length === 0) {
            document.getElementById('userTableBody').innerHTML = '<tr><td colspan="8" style="text-align:center;color:#8b949e;">暂无用户</td></tr>';
            document.getElementById('userCards').innerHTML = '<div style="text-align:center;color:#8b949e;padding:20px;">暂无用户</div>';
            return;
        }

        // 渲染桌面端表格
        let tableHtml = '';
        data.users.forEach(user => {
            const statusClass = user.status === 'online' ? 'status-online' : 'status-offline';
            const statusText = user.status === 'online' ? '🟢 在线' : '🔴 离线';
            const firstSeen = user.first_seen ? formatTime(user.first_seen) : '-';
            const lastHeartbeat = user.last_heartbeat ? formatTime(user.last_heartbeat) : '-';
            // 桌面端显示完整 Android ID
            const androidIdDisplay = user.android_id || '-';
            const note = user.note || '';
            const appVersion = user.app_version
                ? '<span class="version-tag">' + escapeHtml(user.app_version) + '</span>'
                : '<span style="color:#8b949e;">-</span>';
            tableHtml += '<tr>' +
                '<td>' + user.id + '</td>' +
                '<td style="font-family:monospace;font-size:13px;">' + escapeHtml(androidIdDisplay) + '</td>' +
                '<td><span class="status-badge ' + statusClass + '">' + statusText + '</span></td>' +
                '<td>' + appVersion + '</td>' +
                '<td style="font-size:12px;">' + firstSeen + '</td>' +
                '<td style="font-size:12px;">' + lastHeartbeat + '</td>' +
                '<td>' +
                    '<input class="note-input" type="text" placeholder="备注..." value="' + escapeHtml(note) + '" onblur="saveNote(' + user.id + ', this)" />' +
                    '<span class="note-saved" id="saved-' + user.id + '">✓</span>' +
                '</td>' +
                '<td><button class="btn-delete" onclick="deleteUser(' + user.id + ', this)">删除</button></td>' +
            '</tr>';
        });
        document.getElementById('userTableBody').innerHTML = tableHtml;

        // 渲染移动端卡片
        let cardsHtml = '';
        data.users.forEach(user => {
            const statusClass = user.status === 'online' ? 'status-online' : 'status-offline';
            const statusText = user.status === 'online' ? '🟢 在线' : '🔴 离线';
            const firstSeen = user.first_seen ? formatTime(user.first_seen) : '-';
            const lastHeartbeat = user.last_heartbeat ? formatTime(user.last_heartbeat) : '-';
            // 移动端也显示完整 Android ID（CSS 会处理换行）
            const androidIdDisplay = user.android_id || '-';
            const note = user.note || '';
            const appVersion = user.app_version
                ? '<span class="version-tag">' + escapeHtml(user.app_version) + '</span>'
                : '<span style="color:#8b949e;">-</span>';

            cardsHtml += '<div class="user-card">' +
                '<div class="user-card-header">' +
                    '<span class="user-card-id">编号 ' + user.id + '</span>' +
                    '<span class="status-badge ' + statusClass + '">' + statusText + '</span>' +
                '</div>' +
                '<div class="user-card-row">' +
                    '<span class="user-card-label">安卓安装标识</span>' +
                    '<span class="user-card-value">' + escapeHtml(androidIdDisplay) + '</span>' +
                '</div>' +
                '<div class="user-card-row">' +
                    '<span class="user-card-label">版本</span>' +
                    '<span class="user-card-value">' + appVersion + '</span>' +
                '</div>' +
                '<div class="user-card-row">' +
                    '<span class="user-card-label">首次连接</span>' +
                    '<span class="user-card-value">' + firstSeen + '</span>' +
                '</div>' +
                '<div class="user-card-row">' +
                    '<span class="user-card-label">最后心跳</span>' +
                    '<span class="user-card-value">' + lastHeartbeat + '</span>' +
                '</div>' +
                '<div class="user-card-row" style="border-bottom:none;padding-bottom:0;">' +
                    '<span class="user-card-label">备注</span>' +
                '</div>' +
                '<input class="note-input-mobile" type="text" placeholder="点击输入备注..." value="' + escapeHtml(note) + '" onblur="saveNote(' + user.id + ', this)" />' +
                '<span class="note-saved show" id="saved-m-' + user.id + '" style="display:none;margin-top:4px;">✓ 已保存</span>' +
                '<button class="btn-delete-mobile" onclick="deleteUser(' + user.id + ', this)">删除用户</button>' +
            '</div>';
        });
        document.getElementById('userCards').innerHTML = cardsHtml;
    }

    function formatTime(t) {
        const d = new Date(t);
        const year = d.getFullYear();
        const month = (d.getMonth() + 1).toString().padStart(2, '0');
        const day = d.getDate().toString().padStart(2, '0');
        const hour = d.getHours().toString().padStart(2, '0');
        const minute = d.getMinutes().toString().padStart(2, '0');
        const second = d.getSeconds().toString().padStart(2, '0');
        return year + '-' + month + '-' + day + ' ' + hour + ':' + minute + ':' + second;
    }

    function escapeHtml(s) {
        return String(s).replace(/[&<>"']/g, c => ({
            '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
        }[c]));
    }

    function saveNote(id, input) {
        const note = input.value.trim();
        apiFetch('/api/users/note?id=' + id + '&note=' + encodeURIComponent(note), { method: 'PUT' })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    // 显示桌面端保存提示
                    const tip = document.getElementById('saved-' + id);
                    if (tip) { tip.classList.add('show'); setTimeout(() => tip.classList.remove('show'), 1500); }
                    // 显示移动端保存提示
                    const tipM = document.getElementById('saved-m-' + id);
                    if (tipM) { tipM.style.display = 'block'; setTimeout(() => tipM.style.display = 'none', 1500); }
                } else {
                    alert('保存失败：' + (data.error || '未知错误'));
                }
            })
            .catch(err => { console.error('保存备注失败:', err); alert('保存失败，请重试'); });
    }

    function deleteUser(id, btn) {
        if (!confirm('确定要删除该用户记录吗？\n删除后该设备重新连接将触发"新用户注册"流程。')) return;
        const card = btn.closest('.user-card') || btn.closest('tr');
        card.style.opacity = '0.4';
        card.style.pointerEvents = 'none';
        apiFetch('/api/users/delete?id=' + id, { method: 'DELETE' })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    card.remove();
                    loadData();
                } else {
                    alert('删除失败：' + (data.error || '未知错误'));
                    card.style.opacity = '1';
                    card.style.pointerEvents = 'auto';
                }
            })
            .catch(err => {
                console.error('删除失败:', err);
                alert('删除失败，请重试');
                card.style.opacity = '1';
                card.style.pointerEvents = 'auto';
            });
    }

    document.getElementById('passwordInput').addEventListener('keydown', function(e) {
        if (e.key === 'Enter') login();
    });

    autoLogin();
    console.log('诸暨公交APP 在线统计面板已加载，默认密码: admin123');
</script>
</body>
</html>
